<!DOCTYPE html>

<body>
    <div id="title_text">
        <h1>
            Klaudio Fusha & Ethan Shanbaum - Horse Race Analysis
        </h1>
    </div>
    <div id="left">
        <div id="fastest_horses"></div>
        <div id="fastest_horses_for_sire"></div>
        <div id="best_trainers"></div>
        <div id="best_jockeys"></div>
    </div>

    <div id="clear_button_container">
        <button id="clear">Clear All Connections</button>
    </div>
    <div id="info_pane">
        <h3>Clicked Horse Info</h3>
        <table>
            <tr>
                <th>
                    Horse Name
                </th>
                <td id="info_pane_horse_name"></td>
            </tr>
            <tr>
                <th>
                    Average Speed (furlongs/second)
                </th>
                <td id="info_pane_average_speed"></td>
            </tr>
            <tr>
                <th>
                    Trainer(s)
                </th>
                <td id="info_pane_trainer"></td>
            </tr>
            <tr>
                <th>
                    Sire(s)
                </th>
                <td id="info_pane_sire"></td>
            </tr>
            <tr>
                <th>
                    Jockey(s)
                </th>
                <td id="info_pane_jockey"></td>
            </tr>
        </table>
    </div>
    <div id="hover_pane">
        <h3>Hovered Info</h3>
        <p id="hover_pane_text"></p>
    </div>
</body>

<!-- Referred to https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Properties/text-shadow for using text shadow for the title-->
<style>

    #clear_button_container{
        float: left;

        float: left;
        width: 70%;
    }
    #hover_pane, #info_pane {
        float: right;
        width: 25%;
        background-color: rgb(238, 233, 189);
        border: 2px solid black;
        padding: 10px;
    }
    div {
        margin-top: 0;
        margin-bottom: 0;
        padding-top: 0;
        padding-bottom: 0;
    }

    body {
        background-image: image-set("damask-pattern-background-green.jpg");
    }

    #title_text, h1 {
        text-align: center;
        margin: 0 auto;
        padding-top: 0;
        padding-bottom: 0;
    }

    #title_text {
        background-color: rgba(238, 233, 189, 0.795);
        width: 70%;
        float: left;
    }

    #clear {
        width: 200px;
        margin: 0 auto;
        display: block;
        background-color: rgb(238, 233, 189);
    }

    #fastest_horses {
        margin: 0 auto;
        border: 2px solid black;
        padding: 0 20px;
        background-color: rgb(238, 233, 189);
    }

    #fastest_horses_for_sire {
        margin: 0 auto;
        border: 2px solid black;
        padding: 0 20px;
        background-color: rgb(238, 233, 189);
    }

    #best_trainers {
        margin: 0 auto;
        border: 2px solid black;
        padding: 0 20px;
        background-color: rgb(238, 233, 189);
    }

    #best_jockeys {
        margin: 0 auto;
        border: 2px solid black;
        padding: 0 20px;
        background-color: rgb(238, 233, 189);
    }


    td, th {
        border: 2px solid black;
        border-collapse: collapse;
    }

</style>
